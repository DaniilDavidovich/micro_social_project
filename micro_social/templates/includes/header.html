{% load static %}

<header class="header-card">

    <a href="/" class="brand">

        <div class="brand-icon">
            <img src="{% static 'image/logo.svg' %}" alt="Micro Social" class="brand-logo">
        </div>

        <span class="brand-title">
            Micro Social
        </span>

        <div class="header-content">

            <a href="{% url 'posts:posts_list' %}"
                class="header-link {% if request.resolver_match.namespace == 'posts' %}active{% endif %}">
                Posts
            </a>

        </div>

    </a>

</header>
